<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Eastern Sierra — May 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>⛰️ Eastern Sierra — May 2026</h1>
      <div id="day-tabs">
        <button class="tab active" data-day="all">All</button>
        <button class="tab" data-day="1">Day 1</button>
        <button class="tab" data-day="2">Day 2</button>
      </div>
    </header>

    <div id="main">
      <aside id="sidebar" class="open">
        <div class="sidebar-drag-handle"><span class="sidebar-handle-bar"></span></div>
        <div id="sidebar-content">
          <div id="sidebar-tabs">
            <button class="st ab active" data-st="stops">📍 Stops</button>
            <button class="st" data-st="filters">🔧 Filters</button>
            <button class="st" data-st="trails">🥾 Trails</button>
          </div>
          <div id="stops-panel" class="sidebar-panel active">
            <div id="stop-list"></div>
          </div>
          <div id="filters-panel" class="sidebar-panel">
            <div id="filter-panel"></div>
          </div>
          <div id="trails-panel" class="sidebar-panel">
            <div id="trail-search-panel">
              <div class="trail-search-header">
                <div class="trail-search-title">Search Trails</div>
                <div class="trail-search-desc">Paste an AllTrails URL or search by name</div>
              </div>
              <div class="trail-search-box">
                <input type="text" id="trail-url-input" placeholder="https://www.alltrails.com/trail/..." />
                <button id="trail-search-btn" class="trail-search-btn">Load</button>
              </div>
              <div id="trail-loading" class="trail-loading" style="display:none">
                <span class="trail-spinner"></span> Fetching trail data...
              </div>
              <div id="trail-error" class="trail-error" style="display:none"></div>
              <div id="trail-result" class="trail-result" style="display:none"></div>
              <div id="imported-trails-list">
                <div class="trail-section-header">Imported Trails</div>
                <div id="trail-list" class="trail-list"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>
      <button id="sidebar-toggle" aria-label="Toggle sidebar">←</button>

      <div id="map-container">
        <div id="info-panel"></div>
        <div id="layer-switcher"></div>
        <div id="map"></div>
        <div id="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#2D6A4F"></span> Campground</div>
          <div class="legend-item"><span class="legend-dot" style="background:#1B4332"></span> Trailhead</div>
          <div class="legend-item"><span class="legend-line" style="background:#E8671A"></span> Driving route</div>
          <div class="legend-item"><span class="legend-line" style="background:#8B5CF6"></span> Imported trail</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script src="app.js"></script>
</body>
</html>
