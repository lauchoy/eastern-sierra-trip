<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eastern Sierra — May 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>⛰️ Eastern Sierra — May 2026</h1>
      <div id="day-tabs">
        <button class="tab active" data-day="all">All</button>
        <button class="tab" data-day="1">Day 1</button>
        <button class="tab" data-day="2">Day 2</button>
      </div>
    </header>

    <div id="main">
      <aside id="sidebar" class="open">
        <div id="sidebar-content">
          <div id="stop-list"></div>
          <div id="info-panel"></div>
        </div>
      </aside>
      <button id="sidebar-toggle" aria-label="Toggle sidebar">←</button>

      <div id="map-container">
        <div id="map"></div>
        <div id="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#2D6A4F"></span> Campground</div>
          <div class="legend-item"><span class="legend-dot" style="background:#1B4332"></span> Trailhead</div>
          <div class="legend-item"><span class="legend-dot" style="background:#6A4C93"></span> Geo Stop</div>
          <div class="legend-item"><span class="legend-dot" style="background:#C9594A"></span> Hot Spring</div>
          <div class="legend-item"><span class="legend-line" style="background:#E8671A"></span> Day 1</div>
          <div class="legend-item"><span class="legend-line" style="background:#2E86AB"></span> Day 2</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script src="app.js"></script>
</body>
</html>
